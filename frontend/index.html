<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOTIQ — Asistente Corporativo Inteligente</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="BOTIQ es un asistente corporativo inteligente para soporte, base de conocimiento y operaciones."
    />
    <meta name="theme-color" content="#272163" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --botiq-primary: #272163;
        --botiq-primary-dark: #1a1645;
        --botiq-primary-light: #3a3490;
        --botiq-accent: #4f46e5;
        --botiq-surface: #f5f5fa;
        --botiq-border: #e2e1f0;
        --botiq-text: #1a1a2e;
        --botiq-muted: #6b6b8a;
        --botiq-white: #ffffff;
        --botiq-success: #059669;
        --botiq-warning: #d97706;
        --botiq-danger: #dc2626;
        --botiq-info: #0284c7;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: var(--botiq-text);
        background: var(--botiq-surface);
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--botiq-border);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--botiq-primary-light);
      }

      a {
        color: var(--botiq-primary);
        text-decoration: none;
      }

      button,
      input,
      textarea,
      select {
        font-family: inherit;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
