<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOTIQ — Asistente Corporativo IQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --iq-primary:   #272163;
        --iq-primary-d: #1a1645;
        --iq-primary-l: #3a3490;
        --iq-accent:    #4f46e5;
        --iq-surface:   #f5f5fa;
        --iq-border:    #e2e1f0;
        --iq-text:      #1a1a2e;
        --iq-muted:     #6b6b8a;
        --iq-white:     #ffffff;
        --iq-success:   #059669;
        --iq-warning:   #d97706;
        --iq-danger:    #dc2626;
        --iq-info:      #0284c7;
        --radius-sm:    6px;
        --radius-md:    10px;
        --radius-lg:    14px;
        --radius-xl:    20px;
        --shadow-sm:    0 1px 3px rgba(39,33,99,0.08);
        --shadow-md:    0 4px 16px rgba(39,33,99,0.12);
        --shadow-lg:    0 8px 32px rgba(39,33,99,0.18);
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 14px;
        color: var(--iq-text);
        background: var(--iq-surface);
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--iq-border); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--iq-primary-l); }
      a { color: var(--iq-primary); text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
