# docker-compose.yml == DESARROLLO
# Para producción: docker-compose -f docker-compose.prod.yml up


services:

  db:
    image: postgres:15-alpine
    container_name: botiq_db
    environment:
      POSTGRES_USER: botiq_user
      POSTGRES_PASSWORD: botiq_pass
      POSTGRES_DB: botiq_db
    ports:
      - "5433:5432"  # Expuesto en dev, cerrado en prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botiq_user -d botiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - botiq_network

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: botiq_chromadb
    ports:
      - "8003:8000"   # Expuesto en dev, cerrado en prod
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - botiq_network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botiq_migrate
    command: alembic upgrade head
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://botiq_user:botiq_pass@db:5432/botiq_db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - botiq_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botiq_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://botiq_user:botiq_pass@db:5432/botiq_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - ./backend/credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - botiq_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: botiq_frontend
    ports:
      - "5180:5173"
    environment:
      - VITE_API_URL=http://localhost:8002/api/v1
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - botiq_network

volumes:
  postgres_data:
  chroma_data:

networks:
  botiq_network:
    driver: bridge
