version: "3.9"

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: botiq_db
    environment:
      POSTGRES_USER: botiq_user
      POSTGRES_PASSWORD: botiq_pass
      POSTGRES_DB: botiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botiq_user -d botiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - botiq_network

  # ── Vector DB para RAG ───────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: botiq_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
    restart: unless-stopped
    networks:
      - botiq_network

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botiq_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://botiq_user:botiq_pass@db:5432/botiq_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app
      - ./backend/credentials:/app/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - botiq_network

  # ── Migraciones (corre una vez y termina) ─────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: botiq_migrate
    command: alembic upgrade head
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://botiq_user:botiq_pass@db:5432/botiq_db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - botiq_network

  # ── Frontend React ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: botiq_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - botiq_network

volumes:
  postgres_data:
  chroma_data:

networks:
  botiq_network:
    driver: bridge
